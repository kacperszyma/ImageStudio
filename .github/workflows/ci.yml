name: CI

# Backend and frontend run as separate jobs (in parallel) so a broken
# lockfile or lint rule on one side doesn't block or hide the other's
# result. Each job calls the matching Dagger functions from .dagger/ —
# identical to what runs on a laptop.
on:
  push:
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.21.7"
          call: build

      - uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.21.7"
          call: test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.21.7"
          call: frontend-lint

      - uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.21.7"
          call: frontend-build
