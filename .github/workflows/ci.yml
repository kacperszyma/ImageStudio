name: CI

# Backend and frontend run as separate jobs (in parallel) so a broken
# lockfile or lint rule on one side doesn't block or hide the other's
# result. Each job calls the matching Dagger functions from .dagger/ —
# identical to what runs on a laptop.
on:
  push:
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend (dotnet build)
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.21.7"
          call: build

      - name: Test backend (dotnet test, unit + integration)
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.21.7"
          call: test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint frontend (eslint)
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.21.7"
          call: frontend-lint

      - name: Build frontend (vite build)
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.21.7"
          call: frontend-build
